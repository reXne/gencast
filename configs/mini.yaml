name: gencast-mini
use_synthetic_data: true

data:
  train_split: ["2019-01-01", "2019-01-12"]
  valid_split: ["2019-01-13", "2019-01-18"]
  test_split: ["2019-01-19", "2019-01-24"]
  batch_size: 2
  model_timestep_hours: 12
  native_timestep_hours: 6
  num_workers: 0
  pin_memory: false
  stats_path: artifacts/stats_mini.npz

model:
  resolution: 10.0
  mesh_refinement: 2
  k_grid_to_mesh: 4
  k_mesh_to_grid: 3
  attention_k_hop: 3
  latent_dim: 128
  processor_layers: 4
  processor_heads: 4
  ffw_hidden_dim: 256
  dropout: 0.0
  input_steps: 2

diffusion:
  sigma_data: 1.0
  sigma_min: 0.02
  sigma_max: 20.0
  rho: 7.0
  num_sampling_steps: 12
  stochastic_churn: 0.0
  churn_min_sigma: 0.0
  churn_max_sigma: 999999.0
  noise_inflation: 1.0

training:
  device: cpu
  epochs: 1
  learning_rate: 0.0002
  weight_decay: 0.0001
  grad_clip: 1.0
  log_every: 1
  valid_every: 1
  num_ensemble_members: 4
  checkpoint_dir: artifacts/checkpoints
  seed: 42

rollout:
  forecast_steps: 4
  ensemble_size: 4
  output_path: artifacts/sample_mini.npz

synthetic:
  num_time_steps: 96
  random_seed: 42

